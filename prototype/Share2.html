<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #E7DECF;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #B3A99C; }

  /* hide scrollbars for a clean mobile feel */
  .no-sb { -ms-overflow-style: none; scrollbar-width: none; }
  .no-sb::-webkit-scrollbar { display: none; width: 0; height: 0; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes toastIn { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes screenIn { from { transform: translateX(26px); } to { transform: translateX(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
</style>
</head>
