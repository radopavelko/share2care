<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<meta name="theme-color" content="#FAFAF8" />
<title>ShareKeep.Online — share it out, keep track, buy less</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #EBEAE7;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #ACAAA6; }

  #root {
    width: 100%;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Phone-shaped column. Full-bleed on phones; a centered card on larger screens. */
  .s2-phone {
    position: relative;
    width: 100%;
    height: 100%;
    background: #FAFAF8;
    overflow: hidden;
  }
  @media (min-width: 480px) {
    .s2-phone {
      width: 420px;
      height: min(880px, 94vh);
      border-radius: 34px;
      border: 1px solid #E2E0DC;
      box-shadow: 0 24px 70px rgba(0,0,0,0.16);
    }
  }

  /* hide scrollbars for a clean mobile feel */
  .no-sb { -ms-overflow-style: none; scrollbar-width: none; }
  .no-sb::-webkit-scrollbar { display: none; width: 0; height: 0; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes toastIn { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes screenIn { from { transform: translateX(26px); } to { transform: translateX(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React (production builds) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Firebase init (ES module): sets up window.S2, then dispatches "s2-ready" -->
<script type="module" src="firebase-init.js"></script>

<!-- App code (compiled in-browser by Babel, executed in order) -->
<script type="text/babel" src="helpers.jsx"></script>
<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="screens-browse.jsx"></script>
<script type="text/babel" src="screens-borrows.jsx"></script>
<script type="text/babel" src="screens-lend.jsx"></script>
<script type="text/babel" src="screens-groups.jsx"></script>
<script type="text/babel" src="screens-onboarding.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
